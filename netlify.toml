[build]
  command   = "npm run build"
  publish   = "out"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

[build.environment]
  NODE_VERSION = "18"

[images]
  remote_images = [
    "https://res\\.cloudinary\\.com/.*",
    "https://.*\\.cloudinary\\.com/.*",
    "https://images\\.unsplash\\.com/.*",
    "https://catalogospromocionales\\.com/.*",
    "https://.*\\.catalogospromocionales\\.com/.*",
    "https://randomuser\\.me/.*",
  ]

# ─── 301 Redirects: limpieza de URLs con señal de México ───────────────────────

[[redirects]]
  from   = "/blog/plumas-ecologicas-baltimore-impulsa-tu-marca-con-conciencia-ambiental-en-mexico"
  to     = "/blog/plumas-ecologicas-baltimore-impulsa-tu-marca-con-conciencia-ambiental-en-ecuador-y-colombia"
  status = 301
  force  = true

[[redirects]]
  from   = "/blog/plumas-ecologicas-baltimore-impulsa-tu-marca-con-conciencia-ambiental-en-mexico/"
  to     = "/blog/plumas-ecologicas-baltimore-impulsa-tu-marca-con-conciencia-ambiental-en-ecuador-y-colombia/"
